<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Info Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <article class="country-card">
    <h2 id="countryName">Japan</h2>
    <p id="capital">Capital: Tokyo</p>
    <p id="region">Region: Asia</p>
    <p id="population">Population: 125,000,000</p>

    <input type="text" id="nameInput" placeholder="Type a country name" />
    <button id="updateBtn">Search country</button>
  </article>

  <script src="main.js"></script>
</body>
</html>
